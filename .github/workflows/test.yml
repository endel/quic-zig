name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        if: runner.os != 'Windows'
        run: zig build

      - name: Test
        run: zig build test

      - name: Fuzz (smoke test)
        if: runner.os != 'Windows'
        run: zig build fuzz
